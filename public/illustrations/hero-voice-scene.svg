<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none" aria-hidden="true">
  <title>Lazur  speak naturally, write brilliantly</title>

  <!-- Horizon -->
  <path d="M-30 318 C140 278 380 278 590 318" stroke="#141210" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>

  <!-- Ground shadow -->
  <ellipse cx="210" cy="320" rx="128" ry="16" fill="#141210" opacity="0.08"/>

  <!-- Chair -->
  <path d="M152 276 V318 M152 296 H176 M152 276 Q162 244 184 254 L196 276" stroke="#141210" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Person -->
  <g id="person">
    <!-- Torso -->
    <path d="M186 276 V232 C186 206 210 198 228 210 C244 220 248 244 248 276" stroke="#141210" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Head -->
    <circle cx="224" cy="186" r="22" stroke="#141210" stroke-width="1.75"/>
    <!-- Hair band / fringe -->
    <path d="M204 178 C216 166 234 166 246 176" stroke="#141210" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Speaking arm -->
    <path d="M248 238 C268 224 282 210 292 198" stroke="#141210" stroke-width="1.75" stroke-linecap="round"/>
    <!-- Keyboard arm -->
    <path d="M186 252 L158 268" stroke="#141210" stroke-width="1.75" stroke-linecap="round"/>
    <!-- Open mouth hint -->
    <path d="M234 196 Q238 200 242 196" stroke="#141210" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Laptop -->
  <g id="laptop">
    <rect x="118" y="268" width="104" height="62" rx="5" stroke="#141210" stroke-width="1.75"/>
    <rect x="126" y="276" width="88" height="44" rx="2.5" fill="#edeae3" stroke="#141210" stroke-width="1" opacity="0.9"/>
    <!-- Screen text -->
    <text x="134" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#141210">Here's the update.</text>
    <!-- Cursor -->
    <rect x="132" y="288" width="1.5" height="14" fill="#5b45e8" rx="0.5"/>
    <!-- Keyboard deck -->
    <path d="M110 330 L230 330 L222 340 H118 Z" stroke="#141210" stroke-width="1.75" stroke-linejoin="round"/>
  </g>

  <!-- Voice waves -->
  <g id="voice-waves" opacity="0.45">
    <path d="M258 182 Q268 172 278 182 T298 182" stroke="#141210" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M264 176 Q278 158 292 176 T316 176" stroke="#141210" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M270 170 Q288 148 306 170 T334 170" stroke="#141210" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Voice path to raw speech bubble -->
  <path d="M302 192 C328 168 352 156 378 148" stroke="#141210" stroke-width="1.2" stroke-linecap="round" opacity="0.2" stroke-dasharray="3 5"/>

  <!-- Raw speech bubble -->
  <g id="raw-speech">
    <rect x="368" y="118" width="162" height="44" rx="10" stroke="#141210" stroke-width="1.2" opacity="0.18"/>
    <text x="382" y="146" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#5c5854" opacity="0.65">um so like the thing</text>
    <line x1="380" y1="140" x2="518" y2="140" stroke="#141210" stroke-width="0.9" opacity="0.22"/>
    <!-- Bubble tail -->
    <path d="M368 152 L352 168 L378 158 Z" fill="#f7f4ef" stroke="#141210" stroke-width="1" opacity="0.18"/>
  </g>

  <!-- Transformation arc -->
  <path d="M420 168 C396 196 348 228 310 252" stroke="#5b45e8" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <path d="M310 252 L318 244 M310 252 L302 246" stroke="#5b45e8" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

  <!-- Floating app context pills -->
  <g id="app-slack" transform="rotate(-6 402 68)">
    <rect x="378" y="52" width="48" height="32" rx="8" stroke="#141210" stroke-width="1" opacity="0.14"/>
    <text x="402" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="500" fill="#5c5854" opacity="0.55">Slack</text>
  </g>
  <g id="app-cursor" transform="rotate(4 468 98)">
    <rect x="444" y="82" width="48" height="32" rx="8" stroke="#141210" stroke-width="1" opacity="0.14"/>
    <text x="468" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="500" fill="#5c5854" opacity="0.55">Cursor</text>
  </g>
  <g id="app-gmail" transform="rotate(-3 356 96)">
    <rect x="332" y="80" width="48" height="32" rx="8" stroke="#141210" stroke-width="1" opacity="0.14"/>
    <text x="356" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="500" fill="#5c5854" opacity="0.55">Gmail</text>
  </g>

  <!-- Accent star -->
  <path d="M488 44 L491.5 53 L501 53 L493.5 58.5 L496.5 68 L488 62.5 L479.5 68 L482.5 58.5 L475 53 L484.5 53 Z" stroke="#5b45e8" stroke-width="1.1" fill="none" opacity="0.55"/>

  <!-- Small sparkle near laptop -->
  <path d="M96 248 L98 254 L104 254 L99 258 L101 264 L96 260 L91 264 L93 258 L88 254 L94 254 Z" stroke="#141210" stroke-width="0.9" fill="none" opacity="0.2"/>
</svg>
